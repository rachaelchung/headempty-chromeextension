<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>head empty</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --beige:      #fdf6ec;
      --beige-dark: #f5e9d3;
      --ink:        #1a1208;
      --ink-light:  #5a4a2e;
      --red:        #e8392a;
      --yellow:     #f5c518;
      --card-shadow: 3px 3px 0px var(--ink);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--beige);
      color: var(--ink);
      min-width: 220px;
      padding: 16px 14px 18px;
    }

    /* dot texture */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle, var(--yellow) 1.5px, transparent 1.5px),
        radial-gradient(circle, #1e6fd9 1px, transparent 1px);
      background-size: 60px 60px, 90px 90px;
      background-position: 8px 8px, 34px 40px;
      opacity: 0.07;
      pointer-events: none; z-index: 0;
    }

    .inner { position: relative; z-index: 1; }

    .brand {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 10px;
    }
    .brand-logo {
      width: 28px; height: 28px; flex-shrink: 0;
    }
    .brand-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.05rem; text-transform: lowercase; color: var(--ink);
      line-height: 1;
    }
    .brand-name span { color: var(--red); }

    .hint {
      font-size: 0.78rem; font-weight: 600; color: var(--ink-light);
      line-height: 1.5; margin-bottom: 14px;
      padding: 10px 12px;
      background: var(--beige-dark);
      border: 2px solid var(--ink);
      border-radius: 12px;
      box-shadow: 2px 2px 0 var(--ink);
    }
    .hint strong { color: var(--ink); font-weight: 800; }

    button {
      width: 100%;
      padding: 11px 14px;
      font-family: 'Fredoka One', cursive;
      font-size: 0.95rem;
      border-radius: 12px;
      border: 2.5px solid var(--ink);
      background: var(--yellow);
      color: var(--ink);
      cursor: pointer;
      box-shadow: var(--card-shadow);
      transition: transform 0.1s, box-shadow 0.1s;
      text-transform: lowercase;
    }
    button:hover  { transform: translate(-2px,-2px); box-shadow: 5px 5px 0 var(--ink); }
    button:active { transform: translate(2px,2px);   box-shadow: 1px 1px 0 var(--ink); }
  </style>
</head>
<body>
  <div class="inner">
    <div class="brand">
      <svg class="brand-logo" viewBox="0 0 28 28">
        <circle cx="14" cy="14" r="13" fill="#f5c518" stroke="#1a1208" stroke-width="2.5"/>
        <circle cx="10.5" cy="12" r="1.8" fill="#1a1208"/>
        <circle cx="17.5" cy="12" r="1.8" fill="#1a1208"/>
        <path d="M10 17 Q14 21 18 17" stroke="#1a1208" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="brand-name">head <span>empty</span>.</span>
    </div>

    <p class="hint">
      sign in to sync your catches. open the app in this browser after google, or use password in settings.
    </p>

    <button type="button" id="openOpts">account &amp; settings →</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
